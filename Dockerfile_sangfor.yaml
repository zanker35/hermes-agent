FROM mirrors.sangfor.com/tianon/gosu:1.19-trixie AS gosu_source
FROM mirrors.sangfor.com/library/debian:13.4

# Build-time proxy fallback for downloads that do not have a Sangfor mirror
# here, such as Playwright browser binaries. Sangfor hosts are excluded by the
# compose file's NO_PROXY build arg so apt/npm/PyPI still use Sangfor directly.
ARG HTTP_PROXY
ARG HTTPS_PROXY
ARG ALL_PROXY
ARG NO_PROXY
ARG http_proxy
ARG https_proxy
ARG all_proxy
ARG no_proxy

ENV PYTHONUNBUFFERED=1
ENV PLAYWRIGHT_BROWSERS_PATH=/opt/hermes/.playwright

# Sangfor package mirrors used by build tools.
ENV npm_config_registry=http://mirrors.sangfor.com/npm/
ENV PIP_INDEX_URL=http://mirrors.sangfor.com/pypi/simple
ENV PIP_TRUSTED_HOST=mirrors.sangfor.com
ENV UV_DEFAULT_INDEX=http://mirrors.sangfor.com/pypi/simple
ENV UV_INDEX_URL=http://mirrors.sangfor.com/pypi/simple
ENV UV_INSECURE_HOST=mirrors.sangfor.com

# Point Debian 13 (trixie) apt sources at Sangfor mirrors before installing
# build/runtime dependencies.
RUN set -eux; \
    rm -f /etc/apt/sources.list /etc/apt/sources.list.d/debian.sources; \
    printf '%s\n' \
      'deb http://mirrors.sangfor.com/nexus/repository/debian-proxy trixie main' \
      'deb http://mirrors.sangfor.com/nexus/repository/debian-proxy trixie-updates main' \
      'deb http://mirrors.sangfor.com/nexus/repository/debian-security-proxy trixie-security main' \
      > /etc/apt/sources.list; \
    apt-get update; \
    apt-get install -y --no-install-recommends \
      bash build-essential curl nodejs npm python3 python3-pip python3-venv \
      ripgrep ffmpeg gcc python3-dev libffi-dev procps git openssh-client \
      docker-cli tini; \
    python3 -m pip install --break-system-packages uv==0.11.6; \
    rm -rf /var/lib/apt/lists/*

RUN useradd -u 10000 -m -d /opt/data hermes

COPY --chmod=0755 --from=gosu_source /gosu /usr/local/bin/

WORKDIR /opt/hermes

# ---------- Layer-cached dependency install ----------
COPY package.json package-lock.json ./
COPY web/package.json web/package-lock.json web/
COPY ui-tui/package.json ui-tui/package-lock.json ui-tui/
COPY ui-tui/packages/hermes-ink/ ui-tui/packages/hermes-ink/

ENV npm_config_install_links=false

RUN npm install --prefer-offline --no-audit && \
    npx playwright install --with-deps chromium --only-shell && \
    (cd web && npm install --prefer-offline --no-audit) && \
    (cd ui-tui && npm install --prefer-offline --no-audit) && \
    npm cache clean --force

# ---------- Source code ----------
COPY --chown=hermes:hermes . .

# Build browser dashboard and terminal UI assets.
RUN cd web && npm run build && \
    cd ../ui-tui && npm run build

# ---------- Permissions ----------
USER root
RUN chmod -R a+rX /opt/hermes && \
    chown -R hermes:hermes /opt/hermes/ui-tui /opt/hermes/node_modules

# ---------- Python virtualenv ----------
RUN uv venv && \
    UV_NO_CONFIG=1 uv pip install --no-cache-dir -e ".[all]" && \
    ln -sf /opt/hermes/.venv/bin/hermes /usr/local/bin/hermes && \
    ln -sf /opt/hermes/.venv/bin/hermes-agent /usr/local/bin/hermes-agent && \
    ln -sf /opt/hermes/.venv/bin/hermes-acp /usr/local/bin/hermes-acp

# ---------- Runtime ----------
ENV HERMES_WEB_DIST=/opt/hermes/hermes_cli/web_dist
ENV HERMES_HOME=/opt/data
ENV PATH="/opt/hermes/.venv/bin:/opt/data/.local/bin:${PATH}"
VOLUME [ "/opt/data" ]
ENTRYPOINT [ "/usr/bin/tini", "-g", "--", "/opt/hermes/docker/entrypoint.sh" ]
